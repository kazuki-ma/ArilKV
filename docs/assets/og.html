<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArilKV OG</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1200px; height: 630px; overflow: hidden; }
      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 18%, rgba(216, 51, 91, 0.58), transparent 340px),
          radial-gradient(circle at 82% 18%, rgba(76, 139, 114, 0.34), transparent 320px),
          linear-gradient(135deg, #150e0f 0%, #28121d 46%, #311812 100%);
        color: #fffaf3;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .frame {
        position: relative;
        width: 1100px;
        height: 530px;
        padding: 62px 68px;
        border: 1px solid rgba(255, 250, 243, 0.18);
        border-radius: 18px;
        background: rgba(21, 16, 15, 0.34);
      }
      .seed {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: radial-gradient(circle at 35% 30%, #fff2c8 0 10%, #f04a6e 11% 45%, #8f1738 72%);
        box-shadow: 0 0 28px rgba(216, 51, 91, 0.72);
      }
      .seed:nth-child(1) { left: 860px; top: 98px; width: 34px; height: 34px; }
      .seed:nth-child(2) { left: 942px; top: 176px; width: 22px; height: 22px; }
      .seed:nth-child(3) { left: 810px; top: 250px; width: 18px; height: 18px; }
      .seed:nth-child(4) { left: 1002px; top: 314px; width: 46px; height: 46px; }
      .eyebrow {
        margin: 0 0 22px;
        color: #f2a65a;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 28px;
        font-size: 146px;
        line-height: 0.82;
        letter-spacing: 0;
      }
      p {
        width: 740px;
        margin: 0;
        color: rgba(255, 250, 243, 0.78);
        font-size: 34px;
        line-height: 1.22;
        font-weight: 600;
      }
      .metric {
        position: absolute;
        right: 68px;
        bottom: 62px;
        color: #fff4cf;
        font-size: 54px;
        font-weight: 800;
      }
      .metric span {
        display: block;
        color: rgba(255, 250, 243, 0.58);
        font-size: 18px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <i class="seed"></i>
      <i class="seed"></i>
      <i class="seed"></i>
      <i class="seed"></i>
      <p class="eyebrow">Formerly Garnet-rs</p>
      <h1>ArilKV</h1>
      <p>Redis-compatible Rust server shaped around owner-thread execution.</p>
      <div class="metric"><span>Pipeline 64 GET</span>1.34M ops/sec</div>
    </div>
  </body>
</html>
