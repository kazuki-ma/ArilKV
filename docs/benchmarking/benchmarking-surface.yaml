reviewed_at: "2026-05-17"
overview_cards:
  - title: "Access control"
    body: "ACL checks, ACL categories, key/channel/database rules, failed-auth accounting, and ACL LOG entries are useful production behavior. They also add request lifecycle work that a password-only fast path does not pay."
  - title: "Observability"
    body: "Slow log, commandstats, MONITOR, client info, and tracking metadata make a server easier to operate. Benchmarks should say whether those hooks are implemented and enabled."
  - title: "Durability and replication"
    body: "AOF/RDB/snapshot, replication offsets, WAIT, WAITAOF, and maxmemory enforcement change what a write must account for before a reply can be emitted."
  - title: "Batching shape"
    body: "Pipeline depth rewards products that classify and batch simple single-key commands. A command-at-a-time compatible executor can be correct while still losing headline P64 throughput."
guidance:
  - "Exact server versions or commit hashes, plus container image digests when Docker is used."
  - "Whether ACLs are disabled, password-only, or full Redis ACL users/rules with ACL LOG."
  - "Whether slow log, commandstats, MONITOR, CLIENT TRACKING, and client metadata are active."
  - "Persistence and replication mode: no durability, snapshot/WAL/AOF, replica configured, WAIT/WAITAOF tested or not."
  - "Pipeline strategy and client shape: pipeline depth, clients, benchmark threads, cluster mode, key distribution, and hit ratio."
  - "CPU and isolation details: core pinning, performance-core selection on heterogeneous CPUs, Docker limits, and whether client/server share cores."
